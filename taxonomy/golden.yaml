# 修改本文件需重新人审；eval 结果仅在对应 golden 版本内可比。
# ─────────────────────────────────────────────────────────────
# 用途：cmd/eval 用它评估分类流水线（change 12 tasks 1.1）。
# 标注基于 change 12 修订后的领域树 + type facet：
#   type:   awesome | interview | tutorial | skill | cli | app | library | software(兜底)
#   domain: 新树叶子 path，可多标签(≤3)；资料类允许为空 []
# 与现行树的 path 对照（eval 跑基线时按此别名换算）：
#   web/frontend  ← web/frontend-framework      web/backend ← web/backend-framework
#   data/pipeline ← data/data-pipeline          lang/utils  ← lang/stdlib-utils
#   ai/media-gen / data/analytics / devtools/ai-coding 为新叶子（现行树无对应）
#
# ── 20 题裁决记录（2026-07-21 人工拍板，行尾 # Qx 即出处；改动前先看这里）──
#  Q1  type 双命中优先级：awesome > interview > tutorial
#  Q2  教程清单判据：纯链接汇总=awesome，内容自含=tutorial
#  Q3  新增 type=skill（agent skill/提示词包），domain 归 ai/llm（Q21 修订为双标 +devtools/ai-coding）
#  Q4  浏览器扩展 type=app，区分靠 domain=apps/browser-ext
#  Q5  构建工具/SSG 统一 type=library，检索靠 domain=web/build-tools
#  Q6  风格指南/最佳实践=tutorial      Q7 速查文档=tutorial、模板集=software
#  Q8  教学算法实现(TheAlgorithms 等)=interview（主要应对面试）
#  Q9  学习型完整系统(mall 等)=tutorial，domain 照标以便区分查找
#  Q10 非编程内容保留、domain 空       Q11 web server → infra/networking
#  Q12 压测+浏览器自动化 → devtools/testing   Q13 language server → devtools/editors
#  Q14 GUI 工具包暂标 lang/utils（建议队列 lang/gui-toolkit）
#  Q15 浏览器暂标 apps/productivity（建议队列 apps/browser）
#  Q16 序列化/RPC → lang/utils
#  Q17 远程桌面/同步/投屏等个人网络工具 → apps/productivity（纯 CLI 管道除外）
#  Q18 LLM 网关/上下文基建 → ai/llm    Q19 逆向→security/pentest，灰色工具照常标注
#  Q20 多标签判据：第二标签仅限「主流用法」，可以这么用 ≠ 主流用法
# ── 二审裁决（Q21-Q32，2026-07-21）──
#  Q21 skill 包 domain 双标 [ai/llm, devtools/ai-coding]   Q22 工具集/框架型 skill 也算 skill
#  Q23-Q27 类推确认：system-design=interview；泛面试资料 domain 空；泛教程 domain 就近挂靠；
#           游戏平台归 gamedev/games；TheAlgorithms 保留 lang/utils
#  Q28 描述含混、人都标不准的条目从 golden 剔除
#  Q29 重复地址双份保留（库存按 GitHub redirect 去重 → 独立 backlog，勿在本 change 做）
#  Q30 数据可视化库归 web/frontend（不再归 ai/data-science；BI 平台归 data/analytics）
#  Q31 交易 API 类暂标 blockchain/protocols，建议队列候选 blockchain/trading
#  Q32 bun 双标维持
#  总原则：用户可根据分类快速找到想要的仓库（type 管形态、domain 管检索）
#
# 抽样：生产 API 分层抽样 284 条（头部/上升/语言分层/形态信号/无topics难例/长尾/薄弱叶子定向补样；
