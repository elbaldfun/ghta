# GitHub topic / 主语言 → 领域 path 的规则映射 v2（change 12 定稿，待人审）
# 命中即归类（免费、确定性），多命中 = 多标签。key 全小写。
# ─────────────────────────────────────────────────────────────
# v2 相对 v1 的清理（依据 golden 误判分析，规则 firing 精度 48%→62%）：
#   · 删「平台/环境」词：android/ios/linux/docker/raspberry-pi/embedded/flutter
#     —— 它们表示「跑在什么上/支持什么」而非「是什么」，误判率极高，改落 LLM
#   · 删「用了某组件≠是该组件」：redis/mysql/postgresql/elasticsearch/mongodb/sql/cache
#   · 删过宽 AI 词：openai/ai-agents/deep-learning/neural-network（易压过更精确的叶子）
#   · 删弱信号：data-visualization/automation/productivity/nextjs/svelte
#   · 新增 ai/media-gen、devtools/ai-coding、data/analytics 的映射
#   · 路径迁移到新树（web/frontend 等）；删 learning 段（→ facets.yaml type）

